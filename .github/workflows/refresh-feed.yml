name: Refresh feed
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run fetch-feed
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/data/feed.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/feed.json
            git commit -m "chore(feed): refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No feed changes."
          fi
